# Workflow that lints code, runs tests, and builds the project. On pushes
# to the main branch, also creates a version and create a release on GitHub.
name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  test_build:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: CHECKOUT
        uses: actions/checkout@v4

      - name: INSTALL - node.js, yarn
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: DEBUG - node, npm, yarn versions
        run: |
          echo "node --version: $(node --version)"
          echo "npm --version: $(npm --version)"
          echo "yarn --version: $(yarn --version)"

      - name: CACHE - get yarn cache folder path
        id: yarn-cache-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: CACHE - yarn dependencies
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock', '.yarnrc.yml') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: INSTALL - dependencies
        run: yarn install --immutable

      - name: COMMITLINT - PR title
        if: github.event_name == 'pull_request'
        run: printf '%s\n' "$PR_TITLE" | yarn commitlint
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: RELEASE - dry-run validation
        if: github.event_name == 'pull_request'
        run: yarn semantic-release --dry-run --no-ci --branches main

      - name: INSTALL - Playwright browser
        run: yarn test:e2e:install

      - name: LINT, UNIT TEST
        run: yarn ci

      - name: E2E TEST
        run: yarn test:e2e

      - name: BUILD
        run: yarn build
        env:
          VITE_PUBLIC_BASE_PATH: ${{ github.ref == 'refs/heads/main' && '/template-vite-react/' || '/' }}
          VITE_CF_DOMAIN: ${{ github.ref == 'refs/heads/main' && 'https://aquia-inc.github.io/template-vite-react/' || '' }}
          VITE_IDP_ENABLED: 'false'

      - name: BUILD - Storybook
        run: yarn build-storybook
        env:
          VITE_PUBLIC_BASE_PATH: ${{ github.ref == 'refs/heads/main' && '/template-vite-react/' || '/' }}
          VITE_CF_DOMAIN: ${{ github.ref == 'refs/heads/main' && 'https://aquia-inc.github.io/template-vite-react/' || '' }}
          VITE_IDP_ENABLED: 'false'

      - name: UPLOAD - build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: dist
          path: './dist'

  release:
    runs-on: ubuntu-latest
    needs: test_build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: CHECKOUT
        uses: actions/checkout@v4

      - name: INSTALL - node.js, yarn
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: CACHE - get yarn cache folder path
        id: yarn-cache-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: CACHE - yarn dependencies
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock', '.yarnrc.yml') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: INSTALL - dependencies
        run: yarn install --immutable

      - name: DOWNLOAD - build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: './dist'

      # semantic-release will only run on pushes to main (see package.json)
      - name: RELEASE
        run: yarn semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy_pages:
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.pages-deployment.outputs.page_url }}
    steps:
      - name: DOWNLOAD - build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: './dist'

      - name: PREPARE - GitHub Pages SPA fallback
        run: cp dist/index.html dist/404.html

      - name: CONFIGURE - GitHub Pages
        uses: actions/configure-pages@v5

      - name: UPLOAD - GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - name: DEPLOY - GitHub Pages
        id: pages-deployment
        uses: actions/deploy-pages@v4
